{% extends "base/base.html" %}

{% block title %}Создать отчёт о поставках{% endblock %}

{% block content %}
<h3>Создать отчёт о поставках</h3>
<form method="POST">
    {{ form.hidden_tag() }}
    <div class="mb-3">
        {{ form.month.label }}
        {{ form.month(class='form-control') }}
    </div>
    <div class="mb-3">
        {{ form.year.label }}
        {{ form.year(class='form-control') }}
    </div>
    <button class="btn btn-primary">{{ form.submit.label.text }}</button>
</form>

{% endblock %}
