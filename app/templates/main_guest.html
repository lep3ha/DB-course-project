{% extends "base/base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-body text-center p-5">
                <i class="bi bi-lock display-1 text-muted mb-4"></i>
                <h2 class="fw-bold mb-3">Работа доступна только авторизованным</h2>
                <p class="lead text-muted mb-4">
                    Для доступа к функциям мониторинга, покупок и администрирования
                    необходимо войти в систему.
                </p>
                <div class="d-grid gap-2 col-8 mx-auto">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                    </a>
                    <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary btn-lg">
                        <i class="bi bi-person-plus me-2"></i>Зарегистрироваться
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
