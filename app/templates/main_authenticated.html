{% extends "base/base.html" %}

{% block title %}Главная{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8">
        <div class="card border-0 shadow-lg">
            <div class="card-body text-center p-5">
                <h1 class="display-5 fw-bold mb-4">Добро пожаловать, {{ session.get('username') }}</h1>
                <p class="lead text-muted mb-5">Выберите действие ниже</p>
                <div class="d-grid gap-3">
                    <a href="{{ url_for('cart.index') }}" class="btn btn-primary btn-lg">
                        <i class="bi bi-bag-fill me-2"></i>Перейти к покупкам
                    </a>
                    <a href="{{ url_for('panel') }}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-speedometer2 me-2"></i>Админ панель <small class="text-muted">(staff only)</small>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
